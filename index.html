<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#031238" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <title>Crasto.ai — onde a IA se paga em 30 dias</title>
    <script>
      // anti-flash: aplica o tema (query ?theme= ou salvo) antes da primeira pintura (white-first é o padrão)
      try {
        var q = new URLSearchParams(location.search).get('theme');
        var th = (q === 'dark' || q === 'light') ? q : localStorage.getItem('crasto_theme');
        if (th === 'dark' || th === 'light') document.documentElement.dataset.theme = th;
      } catch (e) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
