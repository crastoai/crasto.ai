server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ---- Compressao de texto (gzip) ----
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/javascript application/x-javascript application/json
    application/xml application/xml+rss application/rss+xml
    application/manifest+json image/svg+xml
    font/ttf font/otf application/font-woff application/vnd.ms-fontobject;

  # ---- Assets com hash (Vite: /assets/*.[hash].js|css) -> cache imutavel 1 ano ----
  # ^~ garante que este prefixo vence o regex de estaticos abaixo.
  location ^~ /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ---- Demais estaticos (imagens, fontes, favicon) -> 30 dias ----
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?|mp4)$ {
    expires 30d;
    add_header Cache-Control "public";
  }

  # ---- HTML nunca em cache: cada deploy e pego na hora ----
  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # ---- SPA fallback ----
  location / {
    try_files $uri $uri/ /index.html;
  }
}
